apiVersion: apps/v1
kind: Deployment
metadata:
  name: scaletestapp
  namespace: scaletest
spec:
  replicas: 1
  selector:
    matchLabels:
      app: scaletestapp
  template:
    metadata:
      labels:
        app: scaletestapp
    spec:
      containers:
        - name: app
          image: scaletestapp:arm64
          ports:
            - containerPort: 8080
          resources:
            requests:
              memory: "100Mi"
            limits:
              memory: "200Mi"